services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    env_file:
      - ./server/.env
    command: npm run dev

  client:
    build: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next_build:/app/.next
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://server:5000
    command: npm run dev -- -H 0.0.0.0

volumes:
  server_node_modules:
  client_node_modules:
  client_next_build:
